<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Archiver</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      font-size: 14px;
      color: #333;
      background: #f5f5f5;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #1a1a1a;
    }

    .sync-btn {
      width: 100%;
      padding: 12px 16px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .sync-btn:hover {
      background: #45a049;
    }

    .sync-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .sync-btn.syncing {
      background: #2196F3;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .status {
      margin-top: 12px;
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }

    .status.success {
      display: block;
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #c8e6c9;
    }

    .status.error {
      display: block;
      background: #ffebee;
      color: #c62828;
      border: 1px solid #ffcdd2;
    }

    .status.info {
      display: block;
      background: #e3f2fd;
      color: #1565c0;
      border: 1px solid #bbdefb;
    }

    .settings {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #ddd;
    }

    .settings label {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }

    .settings input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
    }

    .stats {
      margin-top: 12px;
      font-size: 12px;
      color: #666;
    }

    .stats span {
      font-weight: 600;
      color: #333;
    }
  </style>
</head>
<body>
  <h1>📦 Chat Archiver</h1>
  
  <button id="syncBtn" class="sync-btn">Sync Chat</button>
  
  <div id="status" class="status"></div>
  
  <div class="stats" id="stats" style="display: none;">
    Messages archived: <span id="messageCount">0</span>
  </div>

  <div class="settings">
    <label for="serverUrl">Server URL</label>
    <input type="text" id="serverUrl" value="http://localhost:7337" placeholder="http://localhost:7337">
  </div>

  <script src="popup.js"></script>
</body>
</html>
