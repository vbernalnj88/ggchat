<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Archiver</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      font-size: 14px;
      color: #333;
      background: #f5f5f5;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #1a1a1a;
    }

    .sync-btn {
      width: 100%;
      padding: 12px 16px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .sync-btn:hover {
      background: #45a049;
    }

    .sync-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .sync-btn.syncing {
      background: #2196F3;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .status {
      margin-top: 12px;
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }

    .status.success {
      display: block;
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #c8e6c9;
    }

    .status.error {
      display: block;
      background: #ffebee;
      color: #c62828;
      border: 1px solid #ffcdd2;
    }

    .status.info {
      display: block;
      background: #e3f2fd;
      color: #1565c0;
      border: 1px solid #bbdefb;
    }

    .settings {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #ddd;
    }

    .settings label {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }

    .settings input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
    }

    .stats {
      margin-top: 12px;
      font-size: 12px;
      color: #666;
    }

    .stats span {
      font-weight: 600;
      color: #333;
    }

    .profile-section {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #ddd;
    }

    .profile-section h2 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #1a1a1a;
    }

    .profile-list {
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: #fff;
    }

    .profile-item {
      padding: 8px 12px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .profile-item:last-child {
      border-bottom: none;
    }

    .profile-item:hover {
      background: #f0f0f0;
    }

    .profile-item.selected {
      background: #e3f2fd;
    }

    .profile-name {
      font-size: 13px;
      color: #333;
    }

    .message-count {
      font-size: 11px;
      color: #666;
      background: #eee;
      padding: 2px 6px;
      border-radius: 10px;
    }

    .profile-actions {
      margin-top: 8px;
      display: flex;
      gap: 8px;
    }

    .action-btn {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .copy-btn {
      background: #2196F3;
      color: white;
    }

    .copy-btn:hover {
      background: #1976D2;
    }

    .copy-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .preview-area {
      margin-top: 8px;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: #fafafa;
      font-size: 11px;
      color: #666;
      max-height: 100px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .no-profiles {
      padding: 16px;
      text-align: center;
      color: #999;
      font-size: 12px;
    }

    .load-profiles-btn {
      width: 100%;
      padding: 8px;
      margin-top: 8px;
      background: #fff;
      color: #333;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .load-profiles-btn:hover {
      background: #f0f0f0;
    }

    .storage-info {
      margin-top: 12px;
      padding: 10px;
      background: #e8f5e9;
      border-radius: 6px;
      font-size: 12px;
      color: #2e7d32;
    }

    .storage-info p {
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <h1>📦 Chat Archiver</h1>
  
  <button id="syncBtn" class="sync-btn">Sync Chat</button>
  
  <div id="status" class="status"></div>
  
  <div class="stats" id="stats" style="display: none;">
    Messages archived: <span id="messageCount">0</span>
  </div>

  <div class="settings">
    <label for="serverUrl">Server URL (deprecated - now using browser storage)</label>
    <input type="text" id="serverUrl" value="http://localhost:7337" placeholder="http://localhost:7337" disabled>
  </div>
  
  <div class="storage-info">
    <p>✅ All chat data is now stored locally in your browser</p>
    <button id="clearStorageBtn" class="action-btn" style="background: #f44336; color: white; margin-top: 8px;">🗑️ Clear All Stored Chat Data</button>
  </div>

  <div class="profile-section">
    <h2>👥 Browse Profiles</h2>
    <button id="loadProfilesBtn" class="load-profiles-btn">Load Profiles from Chat</button>
    <div id="profileList" class="profile-list" style="display: none;">
      <!-- Profile items will be inserted here -->
    </div>
    <div id="noProfilesMsg" class="no-profiles">
      Click "Load Profiles" to see chat participants
    </div>
    <div class="profile-actions" id="profileActions" style="display: none;">
      <button id="copyChatBtn" class="action-btn copy-btn">📋 Copy Chat History</button>
    </div>
    <div id="previewArea" class="preview-area" style="display: none;"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
